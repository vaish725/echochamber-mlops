apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-sink
  namespace: echochamber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-sink
  template:
    metadata:
      labels:
        app: storage-sink
    spec:
      enableServiceLinks: false
      containers:
        - name: storage-sink
          image: echochamber/storage-sink:local
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: echochamber-secrets
                  key: POSTGRES_PASSWORD
            - name: S3_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: S3_ENDPOINT_URL
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: echochamber-config
                  key: S3_BUCKET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: echochamber-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: echochamber-secrets
                  key: AWS_SECRET_ACCESS_KEY
