apiVersion: v1
kind: ConfigMap
metadata:
  name: echochamber-config
  namespace: echochamber
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_INPUT_TOPIC: social-media-stream
  KAFKA_OUTPUT_TOPIC: detection-results
  KAFKA_CONSUMER_GROUP: misinformation-detectors-group-1
  KAFKA_NUM_PARTITIONS: "6"
  LLM_PROVIDER: openai
  LLM_MODEL: gpt-4o
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_EXPERIMENT_NAME: misinformation-detector
  MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: echochamber
  POSTGRES_USER: echochamber
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET: echochamber-raw
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: echochamber
data:
  init-mlflow-db.sql: |
    CREATE DATABASE mlflow;
